<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Top of the Palms – Reserve</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;height:100vh;display:flex;flex-direction:column}
    #w-hdr{background:#006747;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    #w-hdr img{width:32px;height:32px;border-radius:50%;object-fit:cover}
    #w-hdr-text{color:#fff}
    #w-hdr-text .title{font-weight:700;font-size:15px}
    #w-hdr-text .sub{font-size:12px;opacity:.8}
    #cb-msgs{flex:1;overflow-y:auto;padding:14px 14px 6px;display:flex;flex-direction:column;gap:8px}
    .cb-bot,.cb-user{max-width:88%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word}
    .cb-bot{background:#f0fdf4;color:#111827;align-self:flex-start;border-bottom-left-radius:4px}
    .cb-user{background:#006747;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
    .cb-opts{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 10px;flex-shrink:0}
    .cb-opt{padding:7px 13px;border-radius:20px;border:1.5px solid #006747;color:#006747;background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
    .cb-opt:hover{background:#f0fdf4}
    #cb-input-row{border-top:1px solid #f3f4f6;padding:10px 12px;display:flex;gap:8px;flex-shrink:0}
    #cb-inp{flex:1;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:13px;font-family:inherit;outline:none;color:#111827}
    #cb-inp:focus{border-color:#006747}
    #cb-send{background:#006747;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer}
    .cb-typing{align-self:flex-start;padding:8px 14px;background:#f0fdf4;border-radius:14px;border-bottom-left-radius:4px;font-size:20px;letter-spacing:2px;color:#006747}
    .cb-cal{background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:10px;width:100%;font-size:12px;user-select:none;align-self:flex-start}
    .cb-cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .cb-cal-hdr span{font-weight:700;color:#111827;font-size:13px}
    .cb-cal-nav{background:none;border:none;cursor:pointer;color:#006747;font-size:16px;padding:2px 6px;border-radius:4px}
    .cb-cal-nav:hover{background:#f0fdf4}
    .cb-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
    .cb-cal-dow{font-size:10px;font-weight:600;color:#9ca3af;padding:3px 0}
    .cb-cal-day{padding:5px 2px;border-radius:6px;cursor:pointer;color:#374151;transition:background .1s}
    .cb-cal-day:hover:not(.disabled):not(.empty){background:#dcfce7;color:#006747}
    .cb-cal-day.disabled{color:#d1d5db;cursor:default;pointer-events:none}
    .cb-cal-day.empty{pointer-events:none}
    .cb-cal-day.today{font-weight:700;color:#006747}
    .cb-cal-day.selected{background:#006747;color:#fff;font-weight:700}
  </style>
</head>
<body>
  <div id="w-hdr">
    <div>🌴</div>
    <div id="w-hdr-text">
      <div class="title">Top of the Palms</div>
      <div class="sub">Reservation Assistant</div>
    </div>
  </div>
  <div id="cb-msgs"></div>
  <div id="cb-opts-row" class="cb-opts"></div>
  <div id="cb-input-row">
    <input id="cb-inp" placeholder="Type here…" autocomplete="off" onkeydown="if(event.key==='Enter')cbSend()">
    <button id="cb-send" onclick="cbSend()">→</button>
  </div>

<script>
  const API_BASE = '';

  // ── State ──────────────────────────────────────────────────────────────────
  let openHour = 11, openMin = 30, closeHour = 14, closeMin = 0;
  let blockedDatesSet = new Set();
  let calYear = null, calMonth = null;
  // Conversation history sent to the AI each turn (stateless server)
  let history = [];
  // 'chat' | 'another' | 'blocked'
  let mode = 'chat';

  const GREETING = "Hi! I'm your reservation assistant. 👋\n\nTo get started, what's your **full name** and **department**?";

  // ── Boot ───────────────────────────────────────────────────────────────────
  (async function init() {
    try {
      const h = await fetch(API_BASE + '/api/reserve/hours').then(r => r.json());
      if (h.open_time)  { const [hr,mn] = h.open_time.split(':').map(Number);  openHour=hr;  openMin=mn; }
      if (h.close_time) { const [hr,mn] = h.close_time.split(':').map(Number); closeHour=hr; closeMin=mn; }
    } catch(e) {}
    try {
      const d = await fetch(API_BASE + '/api/blocked-dates').then(r => r.json());
      blockedDatesSet = new Set(d.map(x => x.date));
    } catch(e) {}

    // Seed history with the greeting so the AI knows what it already "said"
    history = [{ role: 'assistant', content: GREETING }];
    addMsg(GREETING, 'bot');
    unblockInput();
  })();

  // ── Helpers ────────────────────────────────────────────────────────────────
  function addMsg(text, who) {
    const msgs = document.getElementById('cb-msgs');
    const el = document.createElement('div');
    el.className = who === 'bot' ? 'cb-bot' : 'cb-user';
    el.innerHTML = text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function showOpts(opts) {
    const row = document.getElementById('cb-opts-row');
    row.innerHTML = '';
    opts.forEach(o => {
      const b = document.createElement('button');
      b.className = 'cb-opt'; b.textContent = o;
      b.onclick = () => { document.getElementById('cb-inp').value = o; cbSend(); };
      row.appendChild(b);
    });
  }
  function clearOpts()   { document.getElementById('cb-opts-row').innerHTML = ''; }
  function typing()      { const msgs=document.getElementById('cb-msgs'),el=document.createElement('div');el.className='cb-typing';el.id='cb-typing';el.textContent='···';msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight; }
  function clearTyping() { document.getElementById('cb-typing')?.remove(); }
  function blockInput()  { mode !== 'another' && (mode = 'blocked'); document.getElementById('cb-send').disabled = true; }
  function unblockInput(){ document.getElementById('cb-send').disabled = false; document.getElementById('cb-inp').focus(); }

  // ── Calendar ───────────────────────────────────────────────────────────────
  function renderCal(year, month) {
    calYear = year; calMonth = month;
    const msgs = document.getElementById('cb-msgs');
    document.getElementById('cb-calendar')?.remove();
    const cal = document.createElement('div'); cal.className = 'cb-cal'; cal.id = 'cb-calendar';
    const now = new Date(), minDate = new Date();
    minDate.setDate(minDate.getDate() + 1); minDate.setHours(0,0,0,0);
    const monthLabel = new Date(year, month, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });
    const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month+1, 0).getDate();
    let html = `<div class="cb-cal-hdr"><button class="cb-cal-nav" onclick="calPrev()">‹</button><span>${monthLabel}</span><button class="cb-cal-nav" onclick="calNext()">›</button></div><div class="cb-cal-grid">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cb-cal-dow">${d}</div>`).join('')}${Array(firstDay).fill('<div class="cb-cal-day empty"></div>').join('')}`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dt = new Date(year, month, d);
      const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const disabled = dt.getDay()===0||dt.getDay()===6||blockedDatesSet.has(iso)||dt<minDate;
      const isToday = dt.toDateString() === now.toDateString();
      html += `<div class="cb-cal-day${disabled?' disabled':''}${isToday?' today':''}" onclick="calPickDate('${iso}')">${d}</div>`;
    }
    html += '</div>'; cal.innerHTML = html; msgs.appendChild(cal); msgs.scrollTop = msgs.scrollHeight;
  }
  window.calPrev = () => renderCal(calMonth===0?calYear-1:calYear, calMonth===0?11:calMonth-1);
  window.calNext = () => renderCal(calMonth===11?calYear+1:calYear, calMonth===11?0:calMonth+1);
  window.calPickDate = function(iso) {
    document.getElementById('cb-calendar')?.remove();
    document.getElementById('cb-inp').value = iso;
    cbSend();
  };

  // ── Time slots ─────────────────────────────────────────────────────────────
  function renderTimeSlots() {
    const lastH = closeMin===0 ? closeHour-1 : closeHour;
    const lastM = closeMin===0 ? 45 : closeMin-15;
    const slots = [];
    for (let h = openHour; h <= lastH; h++) {
      const startM = h===openHour ? openMin : 0, endM = h===lastH ? lastM : 45;
      for (let m = startM; m <= endM; m += 15)
        slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
    showOpts(slots);
  }

  // ── Main send ──────────────────────────────────────────────────────────────
  window.cbSend = function cbSend() {
    const inp = document.getElementById('cb-inp');
    const raw = inp.value.trim();
    if (!raw) return;

    // "another reservation?" mode — yes/no only
    if (mode === 'another') {
      inp.value = ''; clearOpts();
      const yes = /yes|new|reserv/i.test(raw);
      addMsg(yes ? 'Yes, new reservation' : 'No, thanks', 'user');
      if (yes) {
        history = [{ role: 'assistant', content: GREETING }];
        mode = 'chat';
        addMsg(GREETING, 'bot');
        unblockInput();
      } else {
        mode = 'chat';
        addMsg('No problem! Feel free to chat again anytime. 😊', 'bot');
        unblockInput();
      }
      return;
    }

    if (mode !== 'chat') return;

    inp.value = ''; clearOpts();
    document.getElementById('cb-calendar')?.remove();
    addMsg(raw, 'user');
    blockInput();
    typing();

    history.push({ role: 'user', content: raw });

    fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-24) })
    })
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      clearTyping();
      if (!ok) { addMsg('⚠️ ' + (d.error || 'Something went wrong.'), 'bot'); unblockInput(); return; }

      // Store AI reply in history
      history.push({ role: 'assistant', content: d.text || '' });
      addMsg(d.text || '', 'bot');

      if (d.showCalendar) { const n = new Date(); renderCal(n.getFullYear(), n.getMonth()); }
      if (d.showTimes)    { renderTimeSlots(); }

      if (d.complete && d.collected) {
        submitReservation(d.collected);
      } else {
        unblockInput();
      }
    })
    .catch(() => { clearTyping(); addMsg('⚠️ Network error. Please try again.', 'bot'); unblockInput(); });
  };

  // ── Submit collected data ──────────────────────────────────────────────────
  async function submitReservation(c) {
    // Normalise time: "11:30 AM" → "11:30", "11:30" stays
    function toHHMM(t) {
      if (!t) return '11:30';
      const m = String(t).match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
      if (!m) return t;
      let h = parseInt(m[1]), min = m[2], ap = (m[3]||'').toUpperCase();
      if (ap === 'PM' && h !== 12) h += 12;
      if (ap === 'AM' && h === 12) h = 0;
      return `${String(h).padStart(2,'0')}:${min}`;
    }
    const time24   = toHHMM(c.time);
    const dateISO  = c.date + 'T' + time24;
    const dispTime = new Date(dateISO + ':00').toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });

    try {
      const resp = await fetch(API_BASE + '/api/reserve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:               c.name,
          department:         c.department || '',
          phone_ext:          '',
          guest_type:         (c.status || 'faculty').toLowerCase(),
          uid:                c.uid || '',
          email:              c.email,
          party:              parseInt(c.party),
          num_days:           parseInt(c.num_days || 1),
          datetime_iso:       dateISO,
          datetime_display:   new Date(dateISO + ':00').toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' }),
          reservation_time:   dispTime,
          seating_preference: '',
          payment_method:     c.payment_method || 'Credit Card',
          notes:              c.notes || ''
        })
      });
      const data = await resp.json();
      clearTyping();
      if (!resp.ok) {
        addMsg('❌ ' + (data.error || 'Submission failed. Please try again.'), 'bot');
        unblockInput(); return;
      }
      addMsg(`✅ **Reservation submitted!** You'll receive a confirmation email shortly. Thank you, ${c.name}! 🌴`, 'bot');

      // Ask about another reservation
      mode = 'another';
      setTimeout(() => {
        addMsg('Would you like to make **another reservation**?', 'bot');
        showOpts(['Yes, new reservation', 'No, thanks']);
        unblockInput();
      }, 1400);

    } catch(e) {
      addMsg('❌ Could not reach the server. Please try again.', 'bot');
      unblockInput();
    }
  }
</script>
</body>
</html>
