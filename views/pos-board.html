<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Top of Palms POS">
  <meta name="theme-color" content="#006747">
  <link rel="manifest" href="/manifest.json">
  <title>POS Board — On Top of the Palms</title>
  <style>
    /* ── Reset & base ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%;height:-webkit-fill-available}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#0f1117;color:#e8e8e8;
      /* Fill exactly the visual viewport — no URL bar bounce */
      height:100dvh;
      height:100vh;
      display:flex;flex-direction:column;
      overflow:hidden;
      overscroll-behavior:none;
      /* Safe area for notched devices */
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
      padding-left:env(safe-area-inset-left);
      padding-right:env(safe-area-inset-right);
    }

    /* ── Header — fixed top bar ── */
    #hdr{
      flex-shrink:0;
      background:linear-gradient(135deg,#006747,#004d34);
      padding:10px 16px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .hl h1{color:#fff;font-size:16px;font-weight:800;white-space:nowrap}
    .hl p{color:#CFC493;font-size:10px;margin-top:1px}
    .hr{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
    .dp{padding:6px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:13px;outline:none;font-family:inherit;min-width:130px}
    .dp:focus{border-color:#CFC493}
    .tbtn{padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,.2);color:#fff;background:rgba(255,255,255,.12);white-space:nowrap}
    .tbtn:hover,.tbtn:active{background:rgba(255,255,255,.25)}
    .nbtn{padding:6px 11px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid #CFC493;color:#CFC493;background:rgba(207,196,147,.12);text-decoration:none;white-space:nowrap}
    .rbtn{padding:6px 11px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid rgba(239,68,68,.4);color:#f87171;background:rgba(239,68,68,.1);white-space:nowrap}
    .clock{text-align:right;white-space:nowrap}
    .cdate{color:#e8e8e8;font-size:11px}
    .ctime{color:#CFC493;font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}

    /* ── Toolbar (search + filter pills) ── */
    #toolbar{
      flex-shrink:0;
      background:#151821;
      border-bottom:1px solid #252836;
      padding:8px 16px;
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    }
    .search-wrap{position:relative;flex:1;min-width:160px;max-width:320px}
    .search-input{
      width:100%;padding:7px 12px 7px 32px;
      background:#252836;border:1px solid #3d4065;border-radius:18px;
      color:#e8e8e8;font-size:13px;outline:none;font-family:inherit;
    }
    .search-input::placeholder{color:#4b5563}
    .search-input:focus{border-color:#4ade80}
    .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#4b5563;font-size:13px;pointer-events:none}
    .pills{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
    .pills::-webkit-scrollbar{display:none}
    .sp{
      background:#252836;border:1px solid #3d4065;border-radius:14px;
      padding:4px 12px;font-size:12px;color:#9ca3af;cursor:pointer;
      white-space:nowrap;flex-shrink:0;transition:background .12s;
      -webkit-tap-highlight-color:transparent;
    }
    .sp:hover{background:#2d3148}
    .sp.active{border-color:#4ade80;color:#4ade80}
    .sp.active-ns{border-color:#f87171;color:#f87171}
    .sp strong{color:#fff;margin-right:3px}
    .sp.ci strong{color:#4ade80}
    .sp.ns strong{color:#f87171}
    .sp.cov strong{color:#fbbf24}
    .vlbl{color:#a7d9c2;font-size:11px;font-weight:600;margin-left:auto;white-space:nowrap;display:none}
    @media(min-width:600px){.vlbl{display:block}}

    /* ── Board — the scrollable card area ── */
    #board-wrap{
      flex:1;
      overflow-y:auto;
      overflow-x:hidden;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
      padding:12px 14px 20px;
    }
    #board{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:10px;
    }
    @media(min-width:900px){#board{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}}
    @media(max-width:480px){#board{grid-template-columns:1fr 1fr}}
    @media(max-width:360px){#board{grid-template-columns:1fr}}

    /* ── Card ── */
    .rc{background:#1e2130;border:1px solid #2d3148;border-radius:14px;overflow:hidden;transition:box-shadow .15s}
    .rc.checked-in{border-color:rgba(74,222,128,.4);background:#1a2e20}
    .rc.no-show{opacity:.5}
    .rt{padding:11px 14px 8px;border-bottom:1px solid #2d3148;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
    .rn{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
    .rs{font-size:11px;color:#6b7280;margin-top:2px}
    .rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
    .df{background:#60a5fa}.ds{background:#4ade80}
    .rb{padding:10px 14px;display:flex;flex-direction:column;gap:4px}
    .rr{display:flex;justify-content:space-between;align-items:center;font-size:12px}
    .rk{color:#6b7280;font-size:11px}.rv{color:#d1d5db;font-weight:500}
    .rv.big{font-size:24px;font-weight:800;color:#fff;line-height:1}
    .rbg{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px}
    .rf{background:#1e3a5f;color:#60a5fa}.rsb{background:#14532d;color:#4ade80}
    .att-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap}
    .badge-checkin{background:#14532d;color:#4ade80}
    .badge-noshow{background:#3b1515;color:#f87171}
    .badge-pending{background:#252836;color:#6b7280}

    /* ── Seating / Payment sections ── */
    .tbl-section,.pay-section{padding:8px 14px;border-top:1px solid #2d3148}
    .sec-lbl{color:#6b7280;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    .pos-select{width:100%;background:#252836;border:1px solid #3d4065;border-radius:7px;padding:7px 9px;color:#fff;font-size:13px;font-family:inherit;outline:none;cursor:pointer}
    .pos-select:focus{border-color:#4ade80}
    .pay-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
    .pay-chip{
      padding:7px 11px;border-radius:9px;font-size:12px;font-weight:600;
      cursor:pointer;border:1.5px solid #3d4065;color:#6b7280;background:#252836;
      transition:all .12s;user-select:none;-webkit-tap-highlight-color:transparent;
      min-height:34px;display:flex;align-items:center;
    }
    .pay-chip:active{transform:scale(.96)}
    .pay-chip.on{background:#1a2e20;color:#4ade80;border-color:#4ade80}
    .save-sm{
      background:#006747;border:none;color:#fff;border-radius:6px;
      padding:8px;font-size:12px;font-weight:600;cursor:pointer;
      margin-top:6px;width:100%;
    }

    /* ── Attendance buttons ── */
    .att-section{padding:8px 14px 12px;border-top:1px solid #2d3148}
    .att-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .att-btn{
      border:none;border-radius:8px;padding:11px 0;font-size:13px;font-weight:700;
      cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:4px;
      -webkit-tap-highlight-color:transparent;
    }
    .att-btn:active{transform:scale(.96)}
    .btn-ci{background:rgba(74,222,128,.12);color:#4ade80;border:1.5px solid rgba(74,222,128,.3)}
    .btn-ci.active{background:#15532d;color:#4ade80;border-color:#4ade80}
    .btn-ns{background:rgba(248,113,113,.1);color:#f87171;border:1.5px solid rgba(248,113,113,.2)}
    .btn-ns.active{background:#3b1515;color:#f87171;border-color:#f87171}

    /* ── Empty state ── */
    .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#4b5563}
    .empty-icon{font-size:40px;margin-bottom:12px}
    .empty h2{font-size:17px;color:#6b7280;margin-bottom:6px}

    /* ── Install banner ── */
    #install-banner{
      display:none;flex-shrink:0;
      background:#006747;padding:8px 16px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      font-size:12px;color:#fff;
    }
    #install-banner.hidden{display:none!important}

    /* ── Toast ── */
    #_t{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
      background:#111;color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;
      z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}

    /* ── Direct Bill badge ── */
    .db-badge{font-size:10px;color:#c4b5fd;margin-top:5px}
    .db-sign{display:block;text-align:center;background:#7c3aed;color:#fff;border-radius:7px;
      padding:8px;font-size:12px;font-weight:700;text-decoration:none;margin-top:6px}
    .db-ok{font-size:10px;color:#4ade80;margin-top:5px;font-weight:600}
  </style>
</head>
<body>

<!-- Header -->
<div id="hdr">
  <div class="hl"><h1>🌴 Top of the Palms</h1><p>POS · USF Dining</p></div>
  <div class="hr">
    <input class="dp" type="date" id="dpick" onchange="load()">
    <button class="tbtn" onclick="goToday()">Today</button>
    <div class="clock"><div class="cdate" id="cdate"></div><div class="ctime" id="ctime"></div></div>
    <a class="nbtn" href="/manager/dashboard">Mgr</a>
    <button class="rbtn" onclick="doLogout()">Out</button>
  </div>
</div>

<!-- Install banner (shown only in browser, not when installed as app) -->
<div id="install-banner" class="hidden">
  <span>📲 Install as app for full screen — tap Share → Add to Home Screen</span>
  <button onclick="document.getElementById('install-banner').classList.add('hidden')" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer">×</button>
</div>

<!-- Toolbar: search + filter pills -->
<div id="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="srch" type="text" placeholder="Search name, dept, ref…" oninput="applySearch()">
  </div>
  <div class="pills">
    <div class="sp" id="f-all" onclick="setFilter('all')"><strong id="tot">0</strong>All</div>
    <div class="sp ci" id="f-ci" onclick="setFilter('checked_in')"><strong id="ci">0</strong>In</div>
    <div class="sp ns" id="f-ns" onclick="setFilter('no_show')"><strong id="ns">0</strong>No-show</div>
    <div class="sp" id="f-pw" onclick="setFilter('pending')"><strong id="pw">0</strong>Waiting</div>
    <div class="sp cov"><strong id="cov">0</strong>Covers</div>
  </div>
  <span class="vlbl" id="vlbl"></span>
</div>

<!-- Board -->
<div id="board-wrap">
  <div id="board"><div class="empty"><div class="empty-icon">🔄</div><h2>Loading…</h2></div></div>
</div>

<div id="_t"></div>

<script>
const todayISO = new Date().toISOString().split('T')[0];
document.getElementById('dpick').value = todayISO;

let allData = [], activeFilter = 'all', searchQ = '';
const posPaySel = {};

function goToday(){ document.getElementById('dpick').value=todayISO; load(); }

async function load(){
  const date = document.getElementById('dpick').value || todayISO;
  try{
    const resp = await fetch(`/api/pos?date=${date}`);
    if(resp.status===401){ window.location.href='/login?type=pos'; return; }
    const d = await resp.json();
    allData = d.reservations || [];
    renderAll(date);
  }catch(e){
    document.getElementById('board').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h2>Could not load</h2></div>`;
  }
}

function applySearch(){
  searchQ = (document.getElementById('srch').value||'').toLowerCase().trim();
  renderAll(document.getElementById('dpick').value||todayISO);
}

function setFilter(f){
  activeFilter=f;
  ['f-all','f-ci','f-ns','f-pw'].forEach(id=>document.getElementById(id).classList.remove('active','active-ns'));
  const map={all:'f-all',checked_in:'f-ci',no_show:'f-ns',pending:'f-pw'};
  if(map[f]) document.getElementById(map[f]).classList.add(f==='no_show'?'active-ns':'active');
  renderAll(document.getElementById('dpick').value||todayISO);
}

function renderAll(date){
  const isToday = date===todayISO;
  const label = isToday
    ? 'Today — '+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
    : new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('vlbl').textContent = label;

  const ci  = allData.filter(r=>r.attendance==='checked_in').length;
  const ns  = allData.filter(r=>r.attendance==='no_show').length;
  const pw  = allData.filter(r=>!r.attendance||r.attendance==='pending').length;
  const cov = allData.filter(r=>r.attendance!=='no_show').reduce((s,r)=>s+r.party,0);
  document.getElementById('tot').textContent=allData.length;
  document.getElementById('ci').textContent=ci;
  document.getElementById('ns').textContent=ns;
  document.getElementById('pw').textContent=pw;
  document.getElementById('cov').textContent=cov;

  // Filter by tab
  let list = allData;
  if(activeFilter==='checked_in') list=allData.filter(r=>r.attendance==='checked_in');
  else if(activeFilter==='no_show') list=allData.filter(r=>r.attendance==='no_show');
  else if(activeFilter==='pending') list=allData.filter(r=>!r.attendance||r.attendance==='pending');

  // Filter by search
  if(searchQ){
    list=list.filter(r=>{
      const ref=r.id.slice(0,8).toUpperCase();
      return (r.name||'').toLowerCase().includes(searchQ)||(r.department||'').toLowerCase().includes(searchQ)||ref.toLowerCase().includes(searchQ);
    });
  }

  // Sort by reservation time
  list=[...list].sort((a,b)=>(a.datetime_iso||a.datetime||'').localeCompare(b.datetime_iso||b.datetime||''));

  if(!list.length){
    const msgs={all:'No confirmed reservations.',checked_in:'No check-ins yet.',no_show:'No no-shows.',pending:'Everyone is checked in!'};
    document.getElementById('board').innerHTML=`<div class="empty">
      <div class="empty-icon">${activeFilter==='checked_in'?'✅':activeFilter==='no_show'?'🚫':'🌴'}</div>
      <h2>${searchQ?'No results for "'+x(searchQ)+'"':(msgs[activeFilter]||'No reservations.')}</h2>
      ${!isToday&&activeFilter==='all'&&!searchQ?`<p style="margin-top:10px"><button onclick="goToday()" style="background:#006747;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px">← Today</button></p>`:''}
    </div>`;
    return;
  }

  const SEATING = ['Window','Middle','Bench','Private Room A','Private Room B','Private Room C'];
  const PAYMENT = ['Credit Card','USF Card','Direct Bill'];

  document.getElementById('board').innerHTML = list.map(r=>{
    const ref   = r.id.slice(0,8).toUpperCase();
    const isFac = r.guest_status==='faculty';
    const att   = r.attendance||'pending';
    const isCI  = att==='checked_in';
    const isNS  = att==='no_show';
    const seat  = r.table_number||'';
    if(!posPaySel[r.id]) posPaySel[r.id]=(r.payment_method||'').split(',').map(s=>s.trim()).filter(Boolean);

    const badge = isCI
      ? `<span class="att-badge badge-checkin">✓ In${r.checked_in_at?' '+fmtTime(r.checked_in_at):''}</span>`
      : isNS ? `<span class="att-badge badge-noshow">✕ No-show</span>`
      : `<span class="att-badge badge-pending">Waiting</span>`;

    const seatHtml = `<div class="tbl-section">
      <div class="sec-lbl">Seating</div>
      ${isCI
        ? `<div style="font-size:17px;font-weight:800;color:#4ade80;margin-top:2px">${seat||'<span style="color:#4b5563;font-size:12px">Not set</span>'}</div>`
        : `<select class="pos-select" onchange="saveSeating('${r.id}',this.value)">
            <option value="">— Assign seat —</option>
            ${SEATING.map(s=>`<option value="${s}"${seat===s?' selected':''}>${s}</option>`).join('')}
          </select>`
      }
    </div>`;

    // Payment — normalize old "CC/Cash" to "Credit Card" for display
    const normalizedPay = posPaySel[r.id].map(p=>p==='CC/Cash'?'Credit Card':p);
    posPaySel[r.id] = normalizedPay;

    const dbStatus = r.direct_bill_status;
    const payHtml = `<div class="pay-section">
      <div class="sec-lbl">Payment</div>
      <div class="pay-chips" id="pchips-${r.id}">
        ${PAYMENT.map(pm=>`<span class="pay-chip${posPaySel[r.id].includes(pm)?' on':''}" data-rid="${r.id}" data-val="${pm}" onclick="chipTap(this)">${pm}</span>`).join('')}
      </div>
      <button class="save-sm" id="psave-${r.id}" style="display:none" onclick="savePay('${r.id}')">Save Payment</button>
      ${dbStatus==='pending_send'||dbStatus==='sent'?`<div class="db-badge">📄 Direct Bill — ${dbStatus==='sent'?'form sent, awaiting return':'form not yet sent'}</div><a href="/directbill/sign?id=${r.id}" class="db-sign">✍️ Sign at Reception</a>`:''}
      ${dbStatus==='received'?`<div class="db-ok">✓ Direct Bill received</div>`:''}
      ${(r.payment_method||'').includes('Direct Bill')&&(!dbStatus||dbStatus==='na')?`<a href="/directbill/sign?id=${r.id}" class="db-sign">✍️ Sign Direct Bill</a>`:''}
    </div>`;

    const attHtml = `<div class="att-section">
      <div class="att-btns">
        <button class="att-btn btn-ci${isCI?' active':''}" onclick="markAtt('${r.id}','${isCI?'pending':'checked_in'}')">
          ✓ ${isCI?'Undo':'Check In'}
        </button>
        <button class="att-btn btn-ns${isNS?' active':''}" onclick="markAtt('${r.id}','${isNS?'pending':'no_show'}')">
          ✕ ${isNS?'Undo':'No-show'}
        </button>
      </div>
    </div>`;

    return `<div class="rc${isCI?' checked-in':isNS?' no-show':''}" id="rc-${r.id}">
      <div class="rt">
        <div style="flex:1;min-width:0">
          <div class="rn">${x(r.name)}</div>
          <div class="rs">${x(r.datetime)}</div>
          <div style="margin-top:4px">${badge}</div>
        </div>
        <div class="rdot ${isFac?'df':'ds'}" style="margin-top:2px"></div>
      </div>
      <div class="rb">
        <div class="rr"><span class="rk">Party</span><span class="rv big">${r.party}</span></div>
        <div class="rr"><span class="rk">Type</span><span class="rbg ${isFac?'rf':'rsb'}">${isFac?'Faculty':'Student'}</span></div>
        ${r.department?`<div class="rr"><span class="rk">Dept</span><span class="rv" style="font-size:11px">${x(r.department)}</span></div>`:''}
        <div class="rr"><span class="rk">Ref</span><span class="rv" style="font-family:monospace;font-size:11px">${ref}</span></div>
        ${r.notes?`<div class="rr"><span class="rk">Notes</span><span class="rv" style="font-size:10px;max-width:55%">${x(r.notes)}</span></div>`:''}
      </div>
      ${seatHtml}${payHtml}${attHtml}
    </div>`;
  }).join('');
}

// Seating
async function saveSeating(id,val){
  await fetch(`/api/pos/table/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({table_number:val})});
  const r=allData.find(r=>r.id===id); if(r) r.table_number=val;
  toast(`Seating: ${val||'none'}`);
}

// Payment chips
function chipTap(el){
  const id=el.getAttribute('data-rid'), val=el.getAttribute('data-val');
  if(!id||!val) return;
  if(!posPaySel[id]){ const r=allData.find(r=>r.id===id); posPaySel[id]=(r?.payment_method||'').split(',').map(s=>s.trim()).filter(Boolean); }
  const idx=posPaySel[id].indexOf(val);
  if(idx>-1) posPaySel[id].splice(idx,1); else posPaySel[id].push(val);
  document.getElementById('pchips-'+id)?.querySelectorAll('.pay-chip').forEach(c=>{
    c.classList.toggle('on',posPaySel[id].includes(c.getAttribute('data-val')));
  });
  const btn=document.getElementById('psave-'+id); if(btn) btn.style.display='block';
}

async function savePay(id){
  const arr=posPaySel[id]||[];
  const resp=await fetch('/api/pos/payment/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({payment_method:arr.join(', ')})});
  if(!resp.ok){toast('Save failed');return;}
  const r=allData.find(r=>r.id===id); if(r) r.payment_method=arr.join(', ');
  delete posPaySel[id];
  const btn=document.getElementById('psave-'+id); if(btn) btn.style.display='none';
  toast('Payment saved ✓');
}

// Attendance
async function markAtt(id,att){
  await fetch(`/api/reservations/${id}/attendance`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({attendance:att})});
  await load();
}

async function doLogout(){ await fetch('/api/logout',{method:'POST'}); window.location.href='/login?type=pos'; }

function toast(m){
  const t=document.getElementById('_t');
  t.textContent=m; t.style.opacity='1';
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.style.opacity='0',2400);
}
function fmtTime(i){ return new Date(i).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
function x(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function tick(){
  const n=new Date();
  document.getElementById('cdate').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('ctime').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick(); setInterval(tick,1000);
load(); setInterval(load,30000);

// Show install banner only in non-standalone browser
if(!window.navigator.standalone && !window.matchMedia('(display-mode: standalone)').matches){
  // Only show after a short delay to avoid flash
  setTimeout(()=>{
    const b=document.getElementById('install-banner');
    if(b) b.classList.remove('hidden');
  }, 3000);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
