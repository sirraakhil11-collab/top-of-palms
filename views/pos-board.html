<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POS Board — On Top of the Palms</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e8e8e8;min-height:100vh}
    header{background:linear-gradient(135deg,#006747,#004d34);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .hl h1{color:#fff;font-size:18px;font-weight:800}
    .hl p{color:#CFC493;font-size:11px;margin-top:2px}
    .hr{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .dp-wrap{display:flex;align-items:center;gap:8px}
    .dp-wrap label{color:#a7d9c2;font-size:12px;white-space:nowrap}
    .dp{padding:7px 11px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:13px;font-family:inherit;outline:none}
    .dp:focus{border-color:#CFC493}
    .tbtn{padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,.2);color:#fff;background:rgba(255,255,255,.12)}
    .tbtn:hover{background:rgba(255,255,255,.22)}
    .nbtn{padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid #CFC493;color:#CFC493;background:rgba(207,196,147,.12);text-decoration:none}
    .nbtn:hover{background:rgba(207,196,147,.25)}
    .rbtn{padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid rgba(239,68,68,.4);color:#f87171;background:rgba(239,68,68,.1);text-decoration:none}
    .clock{text-align:right}
    .cdate{color:#fff;font-size:13px;font-weight:600}
    .ctime{color:#CFC493;font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
    .controls{padding:10px 24px;background:#1a1d27;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2d3148;flex-wrap:wrap}
    .sp{background:#252836;border:1px solid #3d4065;border-radius:18px;padding:5px 14px;font-size:13px;color:#9ca3af;cursor:pointer;transition:background .15s}
    .sp:hover{background:#2d3148}
    .sp.active{border-color:#4ade80;color:#4ade80}
    .sp.active-ns{border-color:#f87171;color:#f87171}
    .sp strong{color:#fff;margin-right:4px}
    .sp.ci strong{color:#4ade80}
    .sp.ns strong{color:#f87171}
    .sp.a strong{color:#fbbf24}
    .viewing{color:#a7d9c2;font-size:12px;font-weight:600;margin-left:auto}
    .legend{padding:7px 24px;background:#1a1d27;border-bottom:1px solid #2d3148;display:flex;align-items:center;gap:20px;font-size:12px;color:#6b7280}
    .ldot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
    .lw{background:#60a5fa}.li{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.5)}.ln{background:#f87171;opacity:.6}
    .board{padding:18px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
    /* Card */
    .rc{background:#1e2130;border:1px solid #2d3148;border-radius:14px;overflow:hidden;transition:transform .15s}
    .rc:hover{transform:translateY(-1px)}
    .rc.checked-in{border-color:rgba(74,222,128,.4);background:#1a2e20}
    .rc.no-show{opacity:.55}
    .rt{padding:13px 16px 9px;border-bottom:1px solid #2d3148;display:flex;justify-content:space-between;align-items:flex-start}
    .rn{font-size:15px;font-weight:700;color:#fff}
    .rs{font-size:12px;color:#6b7280;margin-top:2px}
    .rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
    .df{background:#60a5fa;box-shadow:0 0 7px rgba(96,165,250,.5)}
    .ds{background:#4ade80;box-shadow:0 0 7px rgba(74,222,128,.5)}
    .rb{padding:12px 16px;display:flex;flex-direction:column;gap:5px}
    .rr{display:flex;justify-content:space-between;align-items:center;font-size:13px}
    .rk{color:#6b7280}.rv{color:#d1d5db;font-weight:500}
    .rv.big{font-size:26px;font-weight:800;color:#fff}
    .rbg{font-size:11px;font-weight:600;padding:2px 8px;border-radius:7px}
    .rf{background:#1e3a5f;color:#60a5fa}.rsb{background:#14532d;color:#4ade80}
    /* Att badge */
    .att-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px}
    .badge-checkin{background:#14532d;color:#4ade80}
    .badge-noshow{background:#3b1515;color:#f87171}
    .badge-pending{background:#252836;color:#6b7280}
    /* Sections */
    .tbl-section{padding:9px 16px;border-top:1px solid #2d3148}
    .tbl-label{color:#6b7280;font-size:11px;font-weight:500;margin-bottom:5px}
    .att-section{padding:9px 16px 13px;border-top:1px solid #2d3148}
    .att-label{color:#6b7280;font-size:11px;font-weight:500;margin-bottom:6px}
    .att-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .att-btn{border:none;border-radius:8px;padding:9px 0;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
    .btn-checkin{background:rgba(74,222,128,.12);color:#4ade80;border:1.5px solid rgba(74,222,128,.3)}
    .btn-checkin.active{background:#15532d;color:#4ade80;border-color:#4ade80}
    .btn-noshow{background:rgba(248,113,113,.1);color:#f87171;border:1.5px solid rgba(248,113,113,.2)}
    .btn-noshow.active{background:#3b1515;color:#f87171;border-color:#f87171}
    /* POS dropdowns */
    .pos-select{width:100%;background:#252836;border:1px solid #3d4065;border-radius:7px;padding:8px 10px;color:#fff;font-size:13px;font-family:inherit;outline:none;cursor:pointer;margin-top:2px}
    .pos-select:focus{border-color:#4ade80}
    .pos-ms-wrap{position:relative}
    /* Compact payment chips */
    .pay-chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px}
    .pay-chip{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #3d4065;color:#6b7280;background:#252836;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent;min-height:38px;display:flex;align-items:center}
    .pay-chip:hover,.pay-chip:active{border-color:#4ade80;color:#d1d5db;background:#2d3148}
    .pay-chip.on{background:#1a2e20;color:#4ade80;border-color:#4ade80;box-shadow:0 0 8px rgba(74,222,128,.2)}
    .save-sm{background:#006747;border:none;color:#fff;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;margin-top:5px}
    .save-sm:hover{background:#004d34}
    /* Compact POS table section */
    .tbl-label{color:#6b7280;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    /* Empty */
    .empty{grid-column:1/-1;text-align:center;padding:72px 20px;color:#4b5563}
    .ei{font-size:44px;margin-bottom:14px}
    .empty h2{font-size:18px;color:#6b7280;margin-bottom:6px}
    @media(max-width:640px){
      header{padding:12px 14px;flex-direction:column;gap:8px}
      .board{padding:12px 14px;grid-template-columns:1fr}
      .controls{padding:8px 14px;gap:6px}
      .sp{font-size:12px;padding:5px 10px}
      .pay-chip{padding:10px 12px;font-size:13px}
    }
    @media(max-width:400px){
      .board{grid-template-columns:1fr}
      .att-btns{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<header>
  <div class="hl"><h1>🌴 On Top of the Palms — Reservations</h1><p>POS Board · USF Dining · Compass USA</p></div>
  <div class="hr">
    <div class="dp-wrap">
      <label>Date:</label>
      <input class="dp" type="date" id="dpick" onchange="load()">
      <button class="tbtn" onclick="goToday()">Today</button>
    </div>
    <div class="clock"><div class="cdate" id="cdate"></div><div class="ctime" id="ctime"></div></div>
    <a class="nbtn" href="/manager/dashboard">← Manager</a>
    <button class="rbtn" onclick="logout()">Sign out</button>
  </div>
</header>

<div class="controls">
  <div class="sp" id="f-all"  onclick="setFilter('all')"><strong id="tot">0</strong>Total</div>
  <div class="sp ci" id="f-ci"  onclick="setFilter('checked_in')"><strong id="ci">0</strong>Checked in</div>
  <div class="sp ns" id="f-ns"  onclick="setFilter('no_show')"><strong id="ns">0</strong>No-show</div>
  <div class="sp" id="f-pw"  onclick="setFilter('pending')"><strong id="pw">0</strong>Waiting</div>
  <div class="sp a"><strong id="cov">0</strong>Covers</div>
  <span class="viewing" id="vlbl"></span>
</div>

<div class="legend">
  <span><span class="ldot lw"></span>Waiting</span>
  <span><span class="ldot li"></span>Checked in</span>
  <span><span class="ldot ln"></span>No-show</span>
  <span style="margin-left:auto;font-size:11px">Tap a card to check in or mark no-show</span>
</div>

<div class="board" id="board">
  <div class="empty"><div class="ei">🔄</div><h2>Loading…</h2></div>
</div>

<script>
const todayISO = new Date().toISOString().split('T')[0];
document.getElementById('dpick').value = todayISO;

let allData = [], activeFilter = 'all';
const posPaySel = {}; // tracks per-card payment selections

function goToday(){ document.getElementById('dpick').value=todayISO; load(); }

async function load(){
  const date = document.getElementById('dpick').value || todayISO;
  try{
    const resp = await fetch(`/api/pos?date=${date}`);
    if(resp.status===401){ window.location.href='/login?type=pos'; return; }
    const d = await resp.json();
    allData = d.reservations || [];
    render(date);
  }catch(e){
    document.getElementById('board').innerHTML=`<div class="empty"><div class="ei">⚠️</div><h2>Could not load</h2><p>${e.message}</p></div>`;
  }
}

function setFilter(f){
  activeFilter=f;
  ['all','ci','ns','pw'].forEach((_,i)=>{
    const ids=['f-all','f-ci','f-ns','f-pw'];
    document.getElementById(ids[i]).classList.remove('active','active-ns');
  });
  const map={all:'f-all',checked_in:'f-ci',no_show:'f-ns',pending:'f-pw'};
  if(map[f]) document.getElementById(map[f]).classList.add(f==='no_show'?'active-ns':'active');
  render(document.getElementById('dpick').value||todayISO);
}

function render(date){
  const isToday = date===todayISO;
  const label = isToday
    ? 'Today — '+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
    : new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('vlbl').textContent=label;

  const ci  = allData.filter(r=>r.attendance==='checked_in').length;
  const ns  = allData.filter(r=>r.attendance==='no_show').length;
  const pw  = allData.filter(r=>!r.attendance||r.attendance==='pending').length;
  const cov = allData.filter(r=>r.attendance!=='no_show').reduce((s,r)=>s+r.party,0);
  document.getElementById('tot').textContent=allData.length;
  document.getElementById('ci').textContent=ci;
  document.getElementById('ns').textContent=ns;
  document.getElementById('pw').textContent=pw;
  document.getElementById('cov').textContent=cov;

  let filtered = allData;
  if(activeFilter==='checked_in') filtered=allData.filter(r=>r.attendance==='checked_in');
  else if(activeFilter==='no_show') filtered=allData.filter(r=>r.attendance==='no_show');
  else if(activeFilter==='pending') filtered=allData.filter(r=>!r.attendance||r.attendance==='pending');
  // Sort: waiting first, then no-show, then checked-in at the bottom
  const order = {'pending':0,'no_show':1,'checked_in':2};
  filtered = [...filtered].sort((a,b) => {
    const ao = order[a.attendance||'pending'] ?? 0;
    const bo = order[b.attendance||'pending'] ?? 0;
    return ao - bo;
  });

  if(!filtered.length){
    const msgs={all:'No confirmed reservations for this date.',checked_in:'No guests checked in yet.',no_show:'No no-shows recorded.',pending:'Everyone is checked in!'};
    document.getElementById('board').innerHTML=`<div class="empty">
      <div class="ei">${activeFilter==='checked_in'?'✅':activeFilter==='no_show'?'🚫':'🌴'}</div>
      <h2>${msgs[activeFilter]||'No reservations.'}</h2>
      ${!isToday&&activeFilter==='all'?`<p style="margin-top:10px"><button onclick="goToday()" style="background:#006747;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px">← Back to today</button></p>`:''}
    </div>`;
    return;
  }

  const SEATING = ['Window','Middle','Bench','Private Room A','Private Room B','Private Room C'];
  const PAYMENT = ['CC/Cash','USF Card','Direct Bill'];

  document.getElementById('board').innerHTML = filtered.map(r => {
    const ref         = r.id.slice(0,8).toUpperCase();
    const isFac       = r.guest_status === 'faculty';
    const att         = r.attendance || 'pending';
    const isCheckedIn = att === 'checked_in';
    const isNoShow    = att === 'no_show';
    const curSeat     = r.table_number || '';
    const curPay      = (posPaySel[r.id] || (r.payment_method||'').split(',').map(s=>s.trim()).filter(Boolean));
    if(!posPaySel[r.id]) posPaySel[r.id]=[...curPay];

    const attBadge = isCheckedIn
      ? `<span class="att-badge badge-checkin">✓ Checked in${r.checked_in_at?' '+fmtTime(r.checked_in_at):''}</span>`
      : isNoShow ? `<span class="att-badge badge-noshow">✕ No-show</span>`
      : `<span class="att-badge badge-pending">Waiting</span>`;

    const seatSection = `<div class="tbl-section">
      <div class="tbl-label">Seating${isCheckedIn?'':' <span style="color:#6b7280;font-size:10px">(tap to assign)</span>'}</div>
      ${isCheckedIn
        ? `<div style="font-size:18px;font-weight:800;color:#4ade80">${curSeat||'<span style="color:#4b5563;font-size:13px">Not assigned</span>'}</div>`
        : `<select class="pos-select" onchange="saveSeating('${r.id}',this.value)">
            <option value="">— Select seating —</option>
            ${SEATING.map(s=>`<option value="${s}"${curSeat===s?' selected':''}>${s}</option>`).join('')}
          </select>`
      }
    </div>`;

    const paySection = `<div class="tbl-section">
      <div class="tbl-label">Payment${isCheckedIn?'':' <span style="color:#6b7280;font-weight:400">(tap to toggle)</span>'}</div>
      ${isCheckedIn
        ? `<div style="font-size:12px;color:#d1d5db;margin-top:2px">${r.payment_method||'<span style="color:#4b5563">Not specified</span>'}</div>`
        : `<div class="pay-chips" id="pchips-${r.id}">
            ${PAYMENT.map(pm=>`<span class="pay-chip${posPaySel[r.id].includes(pm)?' on':''}" data-val="${pm}" onclick="toggleChip('${r.id}','${pm}')">${pm}</span>`).join('')}
          </div>
          <button class="save-sm" id="psave-${r.id}" style="display:none;margin-top:8px;width:100%;padding:10px;font-size:13px;font-weight:700" onclick="savePay('${r.id}')">💾 Save Payment</button>`
      }
      ${r.direct_bill_status==='pending_document'?`<div style="font-size:10px;color:#c4b5fd;margin-top:4px">📄 Direct Bill — awaiting doc</div>`:''}
      ${r.direct_bill_status==='document_received'?`<div style="font-size:10px;color:#4ade80;margin-top:4px">✓ Direct Bill — doc received</div>`:''}
      ${r.seating_preference&&!isCheckedIn?`<div style="font-size:10px;color:#6b7280;margin-top:3px">Pref: ${x(r.seating_preference)}</div>`:''}
    </div>`;

    const attSection = `<div class="att-section">
      <div class="att-label">Attendance</div>
      <div class="att-btns">
        <button class="att-btn btn-checkin${isCheckedIn?' active':''}" onclick="markAtt('${r.id}','${isCheckedIn?'pending':'checked_in'}')">
          ✓ ${isCheckedIn?'Undo':'Check in'}
        </button>
        <button class="att-btn btn-noshow${isNoShow?' active':''}" onclick="markAtt('${r.id}','${isNoShow?'pending':'no_show'}')">
          ✕ ${isNoShow?'Undo':'No-show'}
        </button>
      </div>
    </div>`;

    return `<div class="rc${isCheckedIn?' checked-in':isNoShow?' no-show':''}" id="rc-${r.id}">
      <div class="rt">
        <div><div class="rn">${x(r.name)}</div><div class="rs">${x(r.datetime)}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <div class="rdot ${isFac?'df':'ds'}"></div>
          ${attBadge}
        </div>
      </div>
      <div class="rb">
        <div class="rr"><span class="rk">Party</span><span class="rv big">${r.party}</span></div>
        <div class="rr"><span class="rk">Type</span><span class="rbg ${isFac?'rf':'rsb'}">${isFac?'Faculty':'Student'}</span></div>
        ${r.department?`<div class="rr"><span class="rk">Dept</span><span class="rv" style="font-size:12px">${x(r.department)}</span></div>`:''}
        <div class="rr"><span class="rk">Confirm #</span><span class="rv" style="font-family:monospace;font-size:12px">${ref}</span></div>
        <div class="rr"><span class="rk">UID</span><span class="rv" style="font-family:monospace;font-size:12px">${x(r.uid)}</span></div>
        ${r.notes?`<div class="rr"><span class="rk">Notes</span><span class="rv" style="font-size:11px">${x(r.notes)}</span></div>`:''}
      </div>
      ${seatSection}
      ${paySection}
      ${attSection}
    </div>`;
  }).join('');
}

// ── Seating ────────────────────────────────────────────────────────────────
async function saveSeating(id, val){
  await fetch(`/api/pos/table/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({table_number:val})});
  const r=allData.find(r=>r.id===id); if(r) r.table_number=val;
  toast(`Seating set to ${val||'none'}`);
}

// ── Payment chip functions ────────────────────────────────────────────────
// toggleChip is called by onclick in the HTML chips
// handleChip reads id and val from the element itself - no quote issues
function handleChip(el){
  const id  = el.getAttribute('data-rid');
  const val = el.getAttribute('data-val');
  if(!id || !val) return;

  // Initialize from DB value if first tap
  if(!posPaySel[id]){
    const r = allData.find(r=>r.id===id);
    posPaySel[id] = (r?.payment_method||'').split(',').map(s=>s.trim()).filter(Boolean);
  }

  // Toggle
  const idx = posPaySel[id].indexOf(val);
  if(idx > -1) posPaySel[id].splice(idx,1);
  else          posPaySel[id].push(val);

  // Update ALL chips for this card
  const container = document.getElementById('pchips-'+id);
  if(container){
    container.querySelectorAll('.pay-chip').forEach(chip => {
      const v = chip.getAttribute('data-val');
      chip.classList.toggle('on', posPaySel[id].includes(v));
    });
  }

  // Show save button
  const btn = document.getElementById('psave-'+id);
  if(btn) btn.style.display = 'block';
}

// Keep toggleChip as alias in case called from old HTML
function toggleChip(id, val){
  const el = document.querySelector('#pchips-'+id+' [data-val="'+val+'"]');
  if(el) { handleChip(el); return; }
  // Fallback if element not found
  if(!posPaySel[id]){ const r=allData.find(r=>r.id===id); posPaySel[id]=(r?.payment_method||'').split(',').map(s=>s.trim()).filter(Boolean); }
  const idx=posPaySel[id].indexOf(val);
  if(idx>-1) posPaySel[id].splice(idx,1); else posPaySel[id].push(val);
  const btn=document.getElementById('psave-'+id);
  if(btn) btn.style.display='block';
}

async function savePay(id){
  const arr = posPaySel[id] || [];
  const resp = await fetch('/api/reservations/'+id, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ payment_method: arr.join(', ') })
  });
  if(!resp.ok){ toast('Save failed — try again'); return; }
  // Update local data so re-render shows new value
  const r = allData.find(r=>r.id===id);
  if(r) r.payment_method = arr.join(', ');
  // Clear cache so next auto-reload syncs with DB
  delete posPaySel[id];
  const saveBtn = document.getElementById('psave-'+id);
  if(saveBtn){ saveBtn.style.display='none'; }
  toast('Payment saved ✓');
}

// ── Attendance ─────────────────────────────────────────────────────────────
async function markAtt(id, att){
  await fetch(`/api/reservations/${id}/attendance`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({attendance:att})});
  await load();
}

// ── Close dropdowns on outside click ──────────────────────────────────────
document.addEventListener('click',e=>{
  if(!e.target.closest('.pos-ms-wrap')) document.querySelectorAll('.pos-ms-dd.open').forEach(el=>el.classList.remove('open'));
});

async function logout(){ await fetch('/api/logout',{method:'POST'}); window.location.href='/login?type=pos'; }

function toast(m){let t=document.getElementById('_t');if(!t){t=document.createElement('div');t.id='_t';t.style.cssText='position:fixed;bottom:20px;right:20px;background:#111;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s';document.body.appendChild(t)}t.textContent=m;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2500)}
function fmtTime(i){return new Date(i).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function tick(){
  const n=new Date();
  document.getElementById('cdate').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('ctime').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick(); setInterval(tick,1000);
load(); setInterval(load,30000);
</script>
</body>
</html>
