<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upload Signed Form — On Top of the Palms</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;min-height:100vh;display:flex;flex-direction:column}
    header{background:#006747;padding:18px 24px;text-align:center}
    header h1{color:#fff;font-size:20px;font-weight:800}
    header p{color:#a7d9c2;font-size:12px;margin-top:3px}
    .wrap{max-width:520px;margin:32px auto;padding:0 16px 60px;width:100%}
    .card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .badge{display:inline-block;background:#dbeafe;color:#1d4ed8;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:16px;text-transform:uppercase;letter-spacing:.04em}
    .card h2{font-size:19px;font-weight:700;color:#111827;margin-bottom:6px}
    .card>p{color:#6b7280;font-size:14px;margin-bottom:20px;line-height:1.6}
    .info-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:4px 16px;margin-bottom:24px}
    .info-box table{width:100%;border-collapse:collapse;font-size:13px}
    .info-box td{padding:8px 0;border-bottom:1px solid #f3f4f6}
    .info-box tr:last-child td{border-bottom:none}
    .info-box td:first-child{color:#6b7280}
    .info-box td:last-child{font-weight:600;text-align:right}
    .upload-zone{border:2.5px dashed #d1d5db;border-radius:12px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa;margin-bottom:20px;position:relative}
    .upload-zone:hover,.upload-zone.drag{border-color:#006747;background:#f0fdf4}
    .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-icon{font-size:40px;margin-bottom:10px}
    .upload-zone h3{font-size:16px;font-weight:700;color:#111827;margin-bottom:4px}
    .upload-zone p{font-size:13px;color:#6b7280}
    .file-selected{display:none;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#15803d;align-items:center;gap:10px}
    .file-selected.show{display:flex}
    .submit-btn{width:100%;padding:14px;background:#006747;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s}
    .submit-btn:hover:not(:disabled){background:#005538}
    .submit-btn:disabled{background:#9ca3af;cursor:default}
    .progress{display:none;margin-top:16px}
    .progress-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:8px}
    .progress-fill{height:100%;background:#006747;border-radius:3px;width:0;transition:width .3s}
    .progress-text{font-size:13px;color:#6b7280;margin-top:6px}
    /* Success screen */
    .success{display:none;text-align:center;padding:20px 0}
    .success.show{display:block}
    .success-icon{font-size:64px;margin-bottom:16px}
    .success h2{font-size:22px;font-weight:800;color:#15803d;margin-bottom:8px}
    .success p{color:#6b7280;font-size:14px;line-height:1.7}
    /* Error */
    .error-msg{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;color:#b91c1c;font-size:13px;margin-top:12px}
    .error-msg.show{display:block}
    /* Expired / Invalid */
    .expired{text-align:center;padding:32px 0}
    .expired-icon{font-size:56px;margin-bottom:14px}
    .expired h2{font-size:20px;font-weight:700;color:#374151;margin-bottom:8px}
    .expired p{color:#6b7280;font-size:14px;line-height:1.7}
  </style>
</head>
<body>
  <header>
    <h1>On Top of the Palms</h1>
    <p>USF Dining · Compass USA</p>
  </header>

  <div class="wrap">
    <div class="card" id="main-card">
      <!-- Content injected by JS -->
      <p style="color:#9ca3af;text-align:center;padding:30px 0">Loading…</p>
    </div>
  </div>

<script>
const token = location.pathname.split('/').pop();

async function init() {
  const card = document.getElementById('main-card');
  try {
    const res = await fetch(`/api/directbill/upload-info/${token}`);
    if (!res.ok) {
      const e = await res.json().catch(()=>({error:'Invalid or expired link.'}));
      card.innerHTML = `<div class="expired">
        <div class="expired-icon">🔒</div>
        <h2>Link Not Valid</h2>
        <p>${e.error||'This upload link is invalid or has already been used.'}<br><br>Please contact us if you need a new link.</p>
      </div>`;
      return;
    }
    const r = await res.json();
    renderForm(r);
  } catch(e) {
    card.innerHTML = `<div class="expired"><div class="expired-icon">⚠️</div><h2>Something went wrong</h2><p>Please try again or contact us directly.</p></div>`;
  }
}

function renderForm(r) {
  const amount = r.party ? '$'+(r.party*12.75).toFixed(2) : '—';
  document.getElementById('main-card').innerHTML = `
    <div class="badge">📄 Direct Bill — Upload Required</div>
    <h2>Upload Your Signed Authorization Form</h2>
    <p>Hi <strong>${esc(r.name)}</strong>, please upload your completed and signed Direct Bill Authorization Form below. It will be sent directly to our records.</p>

    <div class="info-box">
      <table>
        <tr><td>Reservation Ref</td><td style="font-family:monospace">${esc(r.ref)}</td></tr>
        <tr><td>Date & Time</td><td>${esc(r.datetime)}</td></tr>
        <tr><td>Party Size</td><td>${r.party} guest${r.party===1?'':'s'}</td></tr>
        <tr><td>Amount Due</td><td style="color:#006747;font-weight:700">${amount}</td></tr>
        <tr><td>Department</td><td>${esc(r.department||'—')}</td></tr>
      </table>
    </div>

    <div id="form-area">
      <div class="upload-zone" id="drop-zone"
           ondragover="event.preventDefault();this.classList.add('drag')"
           ondragleave="this.classList.remove('drag')"
           ondrop="handleDrop(event)">
        <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFile(this.files[0])">
        <div class="upload-icon">📎</div>
        <h3>Tap to choose file</h3>
        <p>PDF, JPG, or PNG · Max 10 MB</p>
      </div>

      <div class="file-selected" id="file-selected">
        <span style="font-size:20px">📄</span>
        <div>
          <div id="file-name" style="font-weight:600"></div>
          <div id="file-size" style="font-size:11px;color:#6b7280;margin-top:1px"></div>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="uploadFile()" disabled>
        📤 Upload Signed Form
      </button>

      <div class="progress" id="progress">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">Uploading…</div>
      </div>

      <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="success" id="success-screen">
      <div class="success-icon">✅</div>
      <h2>Form Received!</h2>
      <p>Thank you, <strong>${esc(r.name)}</strong>.<br>Your signed authorization form has been received and linked to your reservation.<br><br>
      You'll receive a confirmation email shortly. If you have any questions, please call us at <strong>${esc(r.phone||'(813) 974-3573')}</strong>.</p>
    </div>`;
}

let selectedFile = null;
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
}

function handleFile(f) {
  if (!f) return;
  const allowed = ['application/pdf','image/jpeg','image/png'];
  if (!allowed.includes(f.type) && !f.name.match(/\.(pdf|jpg|jpeg|png)$/i)) {
    showErr('Please select a PDF, JPG, or PNG file.');
    return;
  }
  if (f.size > 10 * 1024 * 1024) {
    showErr('File is too large. Maximum size is 10 MB.');
    return;
  }
  selectedFile = f;
  document.getElementById('file-selected').classList.add('show');
  document.getElementById('file-name').textContent = f.name;
  document.getElementById('file-size').textContent = (f.size/1024).toFixed(1)+' KB';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('error-msg').classList.remove('show');
}

function showErr(msg) {
  const el = document.getElementById('error-msg');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
}

async function uploadFile() {
  if (!selectedFile) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading…';
  document.getElementById('progress').style.display = 'block';

  // Animate progress bar
  let pct = 0;
  const timer = setInterval(()=>{
    pct = Math.min(pct + Math.random()*15, 85);
    document.getElementById('progress-fill').style.width = pct+'%';
    document.getElementById('progress-text').textContent = 'Uploading… '+Math.round(pct)+'%';
  }, 200);

  try {
    const fd = new FormData();
    fd.append('file', selectedFile);

    const res = await fetch(`/api/directbill/upload/${token}`, { method:'POST', body:fd });
    clearInterval(timer);

    if (res.ok) {
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('progress-text').textContent = 'Upload complete ✓';
      setTimeout(()=>{
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-screen').classList.add('show');
      }, 600);
    } else {
      const e = await res.json().catch(()=>({error:'Upload failed.'}));
      clearInterval(timer);
      document.getElementById('progress').style.display = 'none';
      btn.disabled = false;
      btn.textContent = '📤 Upload Signed Form';
      showErr(e.error || 'Upload failed. Please try again.');
    }
  } catch(e) {
    clearInterval(timer);
    document.getElementById('progress').style.display = 'none';
    btn.disabled = false;
    btn.textContent = '📤 Upload Signed Form';
    showErr('Network error. Please check your connection and try again.');
  }
}

init();
</script>
</body>
</html>
